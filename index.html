<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>店舗管理ダッシュボード</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="メインメニュー">
      <button class="sidebar-toggle" type="button" id="sidebarToggle" aria-label="メニューを折りたたむ">☰</button>
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">N</div>
        <div>
          <p class="brand-eyebrow">Club Manager</p>
          <h1>NIGHT FLOW</h1>
        </div>
      </div>

      <nav class="nav-list">
        <button class="nav-item active" type="button" data-view="dashboard" aria-label="店舗状況">
          <span aria-hidden="true">⌂</span>
          <span>店舗状況</span>
        </button>
        <button class="nav-item" type="button" data-view="attendance" aria-label="本日の出勤">
          <span aria-hidden="true">◷</span>
          <span>本日の出勤</span>
        </button>
        <button class="nav-item" type="button" data-view="casts" aria-label="キャスト">
          <span aria-hidden="true">◇</span>
          <span>キャスト</span>
        </button>
        <button class="nav-item" type="button" data-view="customers" aria-label="顧客">
          <span aria-hidden="true">◎</span>
          <span>顧客</span>
        </button>
        <button class="nav-item" type="button" data-view="sales" aria-label="会計">
          <span aria-hidden="true">¥</span>
          <span>会計</span>
        </button>
        <button class="nav-item" type="button" data-view="payroll" aria-label="給与">
          <span aria-hidden="true">✓</span>
          <span>給与</span>
        </button>
      </nav>

      <div class="shift-card">
        <span class="status-dot"></span>
        <div>
          <strong>営業中</strong>
          <p>本日 20:00 - 25:00</p>
        </div>
      </div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div>
          <p class="page-kicker">管理者画面</p>
          <div class="title-line">
            <h2 id="pageTitle">店舗状況</h2>
            <span id="businessDateLabel"></span>
          </div>
        </div>
        <div class="topbar-actions">
          <label class="search-box">
            <span aria-hidden="true">⌕</span>
            <input id="globalSearch" type="search" placeholder="顧客・キャスト・卓番号を検索">
          </label>
          <button class="primary-button" type="button" id="openSaleButton">
            <span aria-hidden="true">＋</span>
            <span>新規会計</span>
          </button>
        </div>
      </header>

      <section class="view active" id="dashboardView" aria-labelledby="pageTitle">
        <div class="metric-grid">
          <article class="metric">
            <span class="metric-label">本日の総組数、総客数</span>
            <strong id="todayGroupsGuests">0組 / 0名</strong>
            <small id="activeGroupsGuests">店内 0組 / 0名</small>
          </article>
          <article class="metric">
            <span class="metric-label">本日売上</span>
            <strong id="todaySales">¥0</strong>
            <small id="salesDelta">未会計 0卓</small>
          </article>
          <article class="metric">
            <span class="metric-label">指名状況</span>
            <strong id="nominationCount">0 / 0 / 0</strong>
            <small>同伴本数 / 指名本数 / 場内本数</small>
          </article>
        </div>

        <div class="dashboard-stack">
          <section class="panel">
            <div class="section-heading">
              <div>
                <p>Floor</p>
                <h3>卓状況</h3>
              </div>
              <div class="segmented" role="group" aria-label="卓表示">
                <button class="segment active" type="button" data-filter="open">未会計</button>
                <button class="segment" type="button" data-filter="closed">退店済み</button>
                <button class="segment" type="button" data-filter="all">全て</button>
              </div>
            </div>
            <div class="table-grid" id="tableGrid"></div>
          </section>

        </div>
      </section>

      <section class="view" id="attendanceView" aria-label="本日の出勤">
        <section class="panel attendance-panel">
          <div class="section-heading">
            <div>
              <p>Schedule</p>
              <h3>本日の出勤</h3>
            </div>
            <button class="primary-button" type="button" id="openDailyCastButton">
              <span aria-hidden="true">＋</span>
              <span>当日キャスト追加</span>
            </button>
          </div>
          <div class="cast-list" id="todayCastList"></div>
        </section>
      </section>

      <section class="view" id="castsView" aria-label="キャスト管理">
        <div class="section-heading wide">
          <div>
            <p>Cast</p>
            <h3>キャスト管理</h3>
          </div>
          <button class="primary-button" type="button" id="openCastButton">
            <span aria-hidden="true">＋</span>
            <span>キャスト登録</span>
          </button>
        </div>
        <div class="data-table" id="castTable"></div>
      </section>

      <section class="view" id="customersView" aria-label="顧客管理">
        <div class="section-heading wide">
          <div>
            <p>Customer</p>
            <h3>顧客管理</h3>
          </div>
          <button class="primary-button" type="button" id="openCustomerButton">
            <span aria-hidden="true">＋</span>
            <span>顧客登録</span>
          </button>
        </div>
        <div class="customer-board" id="customerBoard"></div>
      </section>

      <section class="view" id="salesView" aria-label="会計管理">
        <div class="section-heading wide">
          <div>
            <p>Sales</p>
            <h3>会計管理</h3>
          </div>
          <button class="primary-button" type="button" id="openSaleButtonSecondary">
            <span aria-hidden="true">＋</span>
            <span>新規会計</span>
          </button>
        </div>
        <div class="sales-summary">
          <div>
            <span>現状売上</span>
            <strong id="currentSales">¥0</strong>
          </div>
          <div>
            <span>組単価</span>
            <strong id="averageGroupSpend">¥0</strong>
          </div>
          <div>
            <span>客単価</span>
            <strong id="averageSpend">¥0</strong>
          </div>
        </div>
        <div class="data-table" id="salesTable"></div>
      </section>

      <section class="view" id="payrollView" aria-label="給与管理">
        <div class="section-heading wide">
          <div>
            <p>Payroll</p>
            <h3>給与見込</h3>
          </div>
          <label class="toggle">
            <input type="checkbox" id="showInactive">
            <span>退勤者を表示</span>
          </label>
        </div>
        <div class="data-table" id="payrollTable"></div>
      </section>
    </main>
  </div>

  <dialog id="entryDialog">
    <form method="dialog" class="dialog-card" id="entryForm">
      <div class="dialog-head">
        <div>
          <p id="dialogKicker">Entry</p>
          <h3 id="dialogTitle">登録</h3>
        </div>
        <button class="icon-button" type="button" id="closeDialog" aria-label="閉じる">×</button>
      </div>
      <div class="form-grid" id="dialogFields"></div>
      <menu class="dialog-actions">
        <button class="ghost-button" type="button" id="cancelDialog">キャンセル</button>
        <button class="primary-button" type="submit">保存</button>
      </menu>
    </form>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="cloud-config.js?v=20260705-3"></script>
  <script src="app.js?v=20260706-4"></script>
</body>
</html>
